<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width" inital-scale="1.0">
        <title>JS Sphere Assignment</title>

        <link rel="stylesheet" href="style.css">

        <script type = "module" src = "main.js" defer></script>
        <script type = "module" src = "inputs.js" defer></script>
        
    </head>

    <body>

        <h1>Ray Tracer</h1>

        <div id = "container">

            <div id = "controls">

                <!-- Scene Selection & Settings -->

                <select id = "sceneSelect">
                    <option>Phong Lighting</option>
                    <option>Reflection Lighting</option>
                </select>

                <label><input type="checkbox"> Gamma Correction </label>

                <!-- Divide value by 100 --> 
                <div id = "ambientSlider", class="slideContainer">
                    <a>Ambient Light</a>
                    <input type="range" min="0" max="100" value="100" class="slider" id="ambientFactor">
                </div>

                <!-- Divide value by 10 --> 
                <div id = "specularSlider", class="slideContainer">
                    <a>Specular Intensity</a>
                    <input type="range" min="0" max="100" value="40" class="slider" id="specularIntensity">
                </div>

                <div id = "shadowSlider", class="slideContainer">
                    <a>Shadow Intensity</a>
                    <input type="range" min="0" max="100" value="40" class="slider" id="shadowIntensity">
                </div>


                <div id = "msaaSlider", class="slideContainer">
                    <a>MSAA Samples</a>
                    <input type="range" min="0" max="100" value="2" class="slider" id="msaaSamples">
                </div>

                <div id = "bounceSlider", class="slideContainer">
                    <a>Max Reflection Bounces</a>
                    <input type="range" min="0" max="50" value="10" class="slider" id="reflectionBounces">
                </div>
                
                <p></p> <!-- "Line Break" -->

                <!-- Sphere Selection -->

                <select id = "sphereSelect">
                    <option>Phong Lighting</option>
                    <option>Reflection Lighting</option>
                </select>

                <div id="spherePos">

                    <!-- X -->
                    <!-- Y -->
                    <!-- Z -->

                </div> 

                <!-- Colour -->

                <!-- Divide value by 100 --> 
                <div id = "radiusSlider", class="slideContainer">
                    <a>Sphere Radius</a>
                    <input type="range" min="0" max="100" value="50" class="slider" id="sphereRadius">
                </div>

                <!-- Divide value by 100 --> 
                <div id = "reflectivitySlider", class="slideContainer">
                    <a>Sphere Reflectivity</a>
                    <input type="range" min="0" max="100" value="50" class="slider" id="sphereReflectivity">
                </div>

        
            </div>

            <canvas id = "mainCanvas"></canvas>

        </div>

       
        

    </body>
</html>
