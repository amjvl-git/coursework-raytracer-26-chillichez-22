<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content = "width=device-width" inital-scale="1.0">
        <title>JS Sphere Assignment</title>

        <link rel="stylesheet" href="style.css">

        <script type = "module" src = "main.js" defer></script>
        
    </head>

    <body>

        <h1>JS Ray Tracer</h1>

        <div id = "container">

            <div id = "controls">

                <!-- Scene Selection & Settings -->
                <input type = "button" class = "notSliders" id = "sceneReload" value = "Reload Scene">

                <select class = "notSliders" id = "sceneSelect" >
                    <option value = "0">Reflection Demo</option>
                    <option value = "1">Base Phong Demo</option>
                </select>

                <label><input type="checkbox" class = "checkbox" id = "gammaCheckbox"> Gamma Correction </label>

                <!-- Divide value by 100 --> 
                <div id = "ambientSlider", class="slideContainer">
                    <a>Ambient Light</a>
                    <input type="range" min="0" max="100" value="100" class="slider" id="ambientFactor">
                </div>

                <!-- Divide value by 10 --> 
                <div id = "specularSlider", class="slideContainer">
                    <a>Specular Power</a>
                    <input type="range" min="0" max="100" value="40" class="slider" id="specularPower">
                </div>

                <!-- Divide value by 100 --> 
                <div id = "shadowIntensitySlider", class="slideContainer">
                    <a>Shadow Intensity</a>
                    <input type="range" min="0" max="100" value="40" class="slider" id="shadowIntensity">
                </div>

                <div id = "msaaSlider", class="slideContainer">
                    <a>MSAA Samples</a>
                    <input type="range" min="1" max="100" value="2" class="slider" id="msaaSamples">
                </div>

                <div id = "bounceSlider", class="slideContainer">
                    <a>Max Reflection Bounces</a>
                    <input type="range" min="1" max="10" value="5" class="slider" id="reflectionBounces">
                </div>

                <div id = "fresnelSlider", class="slideContainer">
                    <a>Fresnel Power</a>
                    <input type="range" min="0" max="30" value="15" class="slider" id="fresnelPower">
                </div>
                
                <!-- Line break -->
                <a></a>
                <b>Lighting</b>

                <!-- Divide by 100 -->
                <div id="lightDir">
                    <a>Lighting Direction</a>
                    <div id = "lightSliderX", class="slideContainer">
                    <a>X</a>
                    <input type="range" min="-200" max="200" value="0" class="slider" id="lightX">
                    </div>

                    <div id = "lightSliderY", class="slideContainer">
                    <a>Y</a>
                    <input type="range" min="-200" max="200" value="0" class="slider" id="lightY">
                    </div>

                    <div id = "lightSliderZ", class="slideContainer">
                    <a>Z</a>
                    <input type="range" min="-200" max="200" value="0" class="slider" id="lightZ">
                    </div>
                </div> 

               
            </div>
            <div id = "world">    

                <b>Spheres</b> <!-- "Line Break" -->
                <!-- Sphere Selection -->

                <select class = "notSliders" id = "sphereSelect">
                    <option value="0">Sphere One</option>
                    <option value="1">Sphere Two</option>
                    <option value="2">Sphere Three</option>
                    <option value="3">Sphere Four</option>
                    <option value="4">Sphere Five</option>
                    <option value="5">Sphere Six </option>

                </select>

                <div id="spherePos">
                    <a>Sphere Position</a>
                    <div id = "sphereX", class="slideContainer">
                    <a>X</a>
                    <input type="range" min="-5" max="5" value="0" class="slider" id="spherePosX">
                    </div>

                    <div id = "sphereY", class="slideContainer">
                    <a>Y</a>
                    <input type="range" min="-5" max="5" value="0" class="slider" id="spherePosY">
                    </div>

                    <div id = "sphereZ", class="slideContainer">
                    <a>Z</a>
                    <input type="range" min="-5" max="5" value="0" class="slider" id="spherePosZ">
                    </div>
                </div> 

                <!-- Colour -->

                <!-- Divide value by 100 --> 
                <div id = "radiusSlider", class="slideContainer">
                    <a>Sphere Radius</a>
                    <input type="range" min="0" max="100" value="50" class="slider" id="sphereRadius">
                </div>

                <!-- Divide value by 100 --> 
                <div id = "reflectivitySlider", class="slideContainer">
                    <a>Sphere Reflectivity</a>
                    <input type="range" min="0" max="100" value="50" class="slider" id="sphereReflectivity">
                </div>

                <div id = "sphereColourPicker", class="colourPicker">
                    <a>Sphere Colour</a>
                    <input type="color" id = sphereColour>
                </div>

        
            </div>

            <canvas id = "mainCanvas"></canvas>

        </div>

    </body>

</html>
